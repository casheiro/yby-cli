# .github/workflows/feature-pipeline.yaml
name: 🚀 Feature Pipeline (Validate & PR to Develop)

on:
  push:
    branches:
      - "feature/**"
      - "feat/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: 🧪 Validate Go Code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.2

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5.3.0
        with:
          go-version: "1.26"  # Resolve para última patch release (security fixes automáticos)

      - name: 🏃 Run Tests
        run: |
          set -e
          PKGS=$(go list ./... | grep -v 'plugins/sentinel/cli')
          go test -race -v $PKGS

      - name: 🧪 Run E2E Tests (Fast)
        run: go test -race -tags e2e -run "TestAI|TestEmbedding|TestCostTracking|TestBardSessions|TestOllama|TestAtlas_ShouldIgnore|TestSynapstor_Hook" ./test/e2e/scenarios/... -v

      - name: 🔒 Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go build -o /tmp/yby-check ./cmd/yby
          govulncheck -mode binary /tmp/yby-check || true
          echo "⚠️ Vulnerabilidades sem fix na série Go atual são reportadas mas não bloqueiam o pipeline."

      - name: ⬇️ Download Dependencies
        run: go mod download

      - name: 📚 Validate Documentation
        # Smoke Test only (verify generation works, output to temp dir)
        run: go run ./cmd/yby gen-docs /tmp/yby-docs-test

      - name: 🔍 Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: 🔍 Lint Core (Fast)
        run: golangci-lint run --timeout=5m --exclude-dirs plugins/sentinel/cli,pkg/plugin/sdk

      - name: 🔍 Lint K8s (Isolated)
        env:
          GOGC: "30" # Aggressive GC for K8s lint
        run: golangci-lint run --build-tags k8s --timeout=5m --concurrency=1 plugins/sentinel/cli/... pkg/plugin/sdk/...
        timeout-minutes: 15

      - name: 📜 Lint Commits
        uses: wagoid/commitlint-github-action@v6.2.1
        with:
          configFile: commitlint.config.mjs

  create-pr-to-develop:
    name: 🎁 Create PR to Develop
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.2

      - name: ↪️ Create Pull Request (Feature -> Develop)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.ref_name }}
        run: |
          # Extrai um título limpo a partir do nome da branch
          PR_TITLE=$(echo "$HEAD_REF" | sed -e 's,feature/,,g' -e 's/-/ /g' | sed -e 's/\b\(.\)/\u\1/g')
          PR_TITLE="feat: $PR_TITLE"

          EXISTING_PR=$(gh pr list --head "$HEAD_REF" --base "develop" --state open --json number -q '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} de $HEAD_REF para develop já existe."
          else
            echo "Criando PR: '$PR_TITLE'"
            gh pr create \
              --head "$HEAD_REF" \
              --base "develop" \
              --title "$PR_TITLE" \
              --body "PR automático para integrar a feature **$HEAD_REF** na branch **develop**."
          fi
