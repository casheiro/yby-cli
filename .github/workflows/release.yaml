name: "🚀 Deploy Release (GoReleaser)"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-before-release:
    name: 🧪 Pre-Release Validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.3.0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.26.1"

      - name: 🏃 Run Tests
        run: go test ./... -v

  goreleaser:
    name: 🚀 Build & Publish
    runs-on: ubuntu-latest
    needs: [validate-before-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.26.1"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6.3.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
