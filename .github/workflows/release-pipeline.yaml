name: 🛡️ Release Pipeline (Validate & Finalize)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - "release/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: 🧪 Validate Release Branch
    runs-on: ubuntu-latest
    # Run on PR Open/Sync (Validate code before merging)
    if: github.event.action != 'closed'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.3.0

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.26"  # Resolve para última patch release (security fixes automáticos)

      - name: 🏃 Run Tests
        run: go test -race ./... -v

      - name: 🔒 Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go build -o /tmp/yby-check ./cmd/yby
          govulncheck -mode binary /tmp/yby-check || true
          echo "⚠️ Vulnerabilidades sem fix na série Go atual são reportadas mas não bloqueiam o pipeline."

      - name: ⬇️ Download Dependencies
        run: go mod download

      - name: 🔍 Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: 🔍 Lint Core (Fast)
        run: golangci-lint run --timeout=5m --exclude-dirs plugins/sentinel/cli,pkg/plugin/sdk

      - name: 🔍 Lint K8s (Isolated)
        env:
          GOGC: "30" # Aggressive GC for K8s lint
        run: golangci-lint run --build-tags k8s --timeout=5m --concurrency=1 plugins/sentinel/cli/... pkg/plugin/sdk/...
        timeout-minutes: 15

      - name: 📜 Lint Commits
        uses: wagoid/commitlint-github-action@v6.2.1
        with:
          configFile: commitlint.config.mjs

      - name: 🏗️ Verify GoReleaser Config
        uses: goreleaser/goreleaser-action@v6.3.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  finalize-release:
    name: 🚀 Finalize Release
    runs-on: ubuntu-latest
    # Only run on merged PRs to the release branch (The "Close" event)
    if: github.event.pull_request.merged == true
    steps:
      - name: 📥 Checkout release branch
        uses: actions/checkout@v4.3.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: 🏷️ Create Final Tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION=$(echo "${{ github.event.pull_request.base.ref }}" | sed -n 's,release/\(v[0-9]\+\.[0-9]\+\.[0-9]\+\),\1,p')

          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::Could not extract version from branch name: ${{ github.event.pull_request.base.ref }}"
            exit 1
          fi

          echo "Tagging $RELEASE_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_VERSION" -m "Release $RELEASE_VERSION"
          git push origin "$RELEASE_VERSION"

          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: ↪️ Create Pull Request (Release -> Main)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.base.ref }}
          RELEASE_VERSION: ${{ steps.tag.outputs.release_version }}
        run: |
          PR_TITLE="release: Release $RELEASE_VERSION"
          EXISTING_PR=$(gh pr list --head "$HEAD_REF" --base "main" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists."
          else
            gh pr create \
              --head "$HEAD_REF" \
              --base "main" \
              --title "$PR_TITLE" \
              --body "Final release PR for **$RELEASE_VERSION**. Merging this brings the release into main."
          fi

      - name: 🔄 Automated Back-Merge (Release -> Develop)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          RELEASE_VERSION: ${{ steps.tag.outputs.release_version }}
        run: |
          echo "🚀 Syncing $RELEASE_BRANCH ($RELEASE_VERSION) back to develop..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout develop || git checkout -b develop origin/develop
          git merge "origin/$RELEASE_BRANCH" --no-ff -m "chore: Back-merge Release $RELEASE_VERSION to Develop"
          git push origin develop
  publish-docs:
    name: 📚 Publish Documentation
    runs-on: ubuntu-latest
    needs: [finalize-release]
    if: github.event.pull_request.merged == true
    steps:
      - name: 📥 Checkout Wiki
        uses: actions/checkout@v4.3.0
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: docs/wiki

      - name: 📥 Checkout Code
        uses: actions/checkout@v4.3.0
        with:
          path: main-repo

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.26"  # Resolve para última patch release (security fixes automáticos)

      - name: 🔨 Build Native Plugins
        run: |
          cd main-repo
          mkdir -p .yby/plugins
          # Build manual dos plugins conhecidos para garantir que o gen-docs pegue as descrições
          go build -o .yby/plugins/yby-plugin-atlas ./plugins/atlas
          go build -o .yby/plugins/yby-plugin-bard ./plugins/bard
          go build -C ./plugins/synapstor -o ../../.yby/plugins/yby-plugin-synapstor .
          go build -C ./plugins/viz -o ../../.yby/plugins/yby-plugin-viz .
          # Sentinel tem estrutura diferente
          go build -tags k8s -o .yby/plugins/yby-plugin-sentinel ./plugins/sentinel/cli

      - name: 📝 Generate Docs
        run: |
          cd main-repo
          # Gera na raiz da wiki (CLI-Reference.md será criado lá) e limpa comandos antigos se houver
          go run ./cmd/yby gen-docs ../docs/wiki

      - name: 🚀 Commit & Push Wiki
        run: |
          cd docs/wiki

          # Check for changes
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "docs: auto-update reference for release ${{ needs.finalize-release.outputs.release_version }}"
            git push origin master
          else
            echo "✅ Documentation is already up-to-date."
          fi

  notify-failure:
    name: 🚨 Notify on Failure
    runs-on: ubuntu-latest
    needs: [finalize-release]
    if: failure()
    steps:
      - name: 💬 Send notification
        run: |
          echo "The '${{ github.workflow }}' workflow failed."
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
