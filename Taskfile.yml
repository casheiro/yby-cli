version: "3"

tasks:
  default:
    cmds:
      - task: build

  setup-hooks:
    desc: Configure git hooks
    cmds:
      - git config core.hooksPath .githooks
      - chmod +x .githooks/pre-commit
      - echo "✅ Git hooks configured!"

  build:
    desc: Build all binaries
    cmds:
      - go build -o bin/yby ./cmd/yby
      - go build -o bin/yby-plugin-atlas ./plugins/atlas
      - go build -o bin/yby-plugin-bard ./plugins/bard
      - go build -tags k8s -o bin/yby-plugin-sentinel ./plugins/sentinel/cli
      - go build -C ./plugins/synapstor -o ../../bin/yby-plugin-synapstor .
      - go build -C ./plugins/viz -o ../../bin/yby-plugin-viz .

  test:
    desc: Run unit tests (default)
    cmds:
      - go test -v ./pkg/... ./plugins/... ./cmd/...

  test:e2e:
    desc: Run E2E tests (requires Docker)
    cmds:
      - go test -v -tags e2e ./test/e2e/...

  test:e2e:fast:
    desc: Run E2E tests that don't require Docker (AI, sessions, BM25, etc.)
    cmds:
      - go test -v -tags e2e -run "TestAI|TestEmbedding|TestCostTracking|TestBardSessions|TestOllama|TestAtlas_ShouldIgnore|TestSynapstor_BM25|TestSynapstor_Hook" ./test/e2e/scenarios/...

  clean:
    desc: Clean bin directory
    cmds:
      - rm -rf bin/

  vuln:
    desc: Verifica vulnerabilidades em dependências
    cmds:
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - govulncheck ./...
