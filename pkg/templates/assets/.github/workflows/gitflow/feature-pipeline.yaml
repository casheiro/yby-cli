# .github/workflows/feature-pipeline.yaml
name: 🚀 Feature Pipeline (Validate & PR to Develop)

on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: read # Read permissions for checkout
  pull-requests: write # Write permissions to create a PR

jobs:
  validate:
    name: 🔍 Validate Charts
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.2

      - name: 🔧 Setup Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: "v3.11.1"

      - name: 📥 Install Yby CLI
        run: |
          curl -sL https://github.com/casheiro/yby-cli/releases/latest/download/yby_linux_amd64.tar.gz | tar xz
          sudo mv yby /usr/local/bin/

      - name: 🧪 Run Validation
        run: yby validate

  create-pr-to-develop:
    name: 🎁 Create PR to Develop
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4.2.2

      - name: ↪️ Create Pull Request (Feature -> Develop)
        env:
          # Use um PAT com permissão de criar PRs
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.ref_name }}
        run: |
          # Extrai um título limpo a partir do nome da branch
          # Ex: 'feature/add-new-button' vira 'feat: Add new button'
          PR_TITLE=$(echo "$HEAD_REF" | sed -e 's,feature/,,g' -e 's/-/ /g' | sed -e 's/\b\(.\)/\u\1/g')
          PR_TITLE="feat: $PR_TITLE"

          # Verifica se o PR já existe para evitar duplicatas
          EXISTING_PR=$(gh pr list --head "$HEAD_REF" --base "develop" --state open --json number -q '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} de $HEAD_REF para develop já existe. Apenas atualizando com novos commits."
          else
            echo "Criando PR: '$PR_TITLE'"
            gh pr create \
              --head "$HEAD_REF" \
              --base "develop" \
              --title "$PR_TITLE" \
              --body "PR automático para integrar a feature **$HEAD_REF** na branch **develop**."
          fi
