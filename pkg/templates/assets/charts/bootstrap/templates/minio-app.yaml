{{- if .Values.minio.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  labels:
    component: storage
    tier: infrastructure
    app.kubernetes.io/managed-by: yby-cli
spec:
  project: default
  source:
    repoURL: {{ .Values.git.repoURL }}
    targetRevision: {{ .Values.git.targetRevision }}
    path: {{ if .RepoRootPath }}{{ .RepoRootPath }}/{{ end }}charts/minio
    helm:
      valueFiles:
      {{- range $f := .Values.clusterConfig.valueFiles }}
      - {{ printf "../../%s" $f | quote }}
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
