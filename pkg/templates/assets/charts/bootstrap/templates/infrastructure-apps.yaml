apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  labels:
    component: infrastructure
    tier: core
    app.kubernetes.io/managed-by: yby-cli
spec:
  project: default
  source:
    repoURL: {{ .Values.git.repoURL }}
    targetRevision: {{ .Values.git.targetRevision }}
    path: {{ if .RepoRootPath }}{{ .RepoRootPath }}/{{ end }}charts/infrastructure
    helm:
      valueFiles:
      {{- range $f := .Values.clusterConfig.valueFiles }}
      - {{ printf "../../%s" $f | quote }}
      {{- end }}
  destination:
    server: {{ .Values.argocd.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
