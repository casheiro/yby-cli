{{- if .Values.observability.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  labels:
    component: monitoring
    tier: infrastructure
    app.kubernetes.io/managed-by: yby-cli
spec:
  project: default
  source:
    repoURL: {{ .Values.git.repoURL }}
    targetRevision: {{ .Values.git.targetRevision }}
    path: {{ if .RepoRootPath }}{{ .RepoRootPath }}/{{ end }}charts/observability
    helm:
      valueFiles:
      {{- range $f := .Values.clusterConfig.valueFiles }}
      - {{ printf "../../%s" $f | quote }}
      {{- end }}
  destination:
    server: {{ .Values.argocd.destinationServer | default "https://kubernetes.default.svc" }}
    namespace: {{ .Values.namespaces.monitoring | default "monitoring" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
